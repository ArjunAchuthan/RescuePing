name: my_app
description: "Rescue Mesh – offline P2P rescue app with SOS alerts, radar, and mesh chat via Bluetooth/Wi-Fi."
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.5+1

  # Local persistence
  shared_preferences: ^2.5.4
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5

  # IDs + permissions
  uuid: ^4.5.2
  permission_handler: ^12.0.1

  # Peer-to-peer transport (Android Nearby Connections uses Bluetooth/Wi-Fi/Wi-Fi Direct)
  nearby_connections: ^4.3.0


  # GPS (one-shot location for SOS alerts)
  geolocator: ^13.0.2

  # Open external maps for rescue navigation
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
